services:
  # Qdrant Vector Database — host ports for qdrant.e-dani.com + skirmshop app
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pocharlies-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
    networks:
      - skirmshop-network

  # Redis Cache (internal only — no host ports to avoid conflicts)
  redis:
    image: redis:7-alpine
    container_name: pocharlies-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - skirmshop-network

  # RAG Service (web crawling, semantic search, product pipeline)
  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: pocharlies-rag
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - QDRANT_URL=http://pocharlies-qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - VLLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - LITELLM_API_KEY=${LLM_API_KEY:-none}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      - REDIS_URL=redis://pocharlies-redis:6379/0
      - SHOPIFY_SHOP_DOMAIN=${SHOPIFY_SHOP_DOMAIN:-}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN:-}
      - RERANKER_MODEL=${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      - RERANKER_ENABLED=${RERANKER_ENABLED:-true}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-40}
      - UVICORN_MAX_CONCURRENT=${UVICORN_MAX_CONCURRENT:-500}
      - TRANSLATE_MAX_CHUNKS=${TRANSLATE_MAX_CHUNKS:-1}
      - TRANSLATE_MAX_INPUT_TOKENS=${TRANSLATE_MAX_INPUT_TOKENS:-12000}
      - TRANSLATE_MODEL=${TRANSLATE_MODEL:-}
      - SHOPIFY_WEBHOOK_SECRET=${SHOPIFY_WEBHOOK_SECRET:-}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - skirmshop-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "25", "http://localhost:5000/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 30s

  # MCP Server (SSE mode for agent-service connection)
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: pocharlies-mcp
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://pocharlies-qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - POCHARLIES_RAG_URL=http://pocharlies-rag:5000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    networks:
      - skirmshop-network
    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      rag-service:
        condition: service_healthy

  # Picqer WMS MCP Server (SSE mode for agent-service connection)
  picqer-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile.picqer
    container_name: pocharlies-picqer-mcp
    restart: unless-stopped
    environment:
      - PICQER_SUBDOMAIN=${PICQER_SUBDOMAIN:-skirmshop}
      - PICQER_API_KEY=${PICQER_API_KEY}
    networks:
      - skirmshop-network
    ports:
      - "127.0.0.1:8003:8001"

  # PostgreSQL for agent state, tasks, schedules
  postgres:
    image: postgres:16-alpine
    container_name: pocharlies-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: langgraph
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent-secret}
    networks:
      - skirmshop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d langgraph"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LangGraph Agent Orchestrator
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: pocharlies-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agent:${POSTGRES_PASSWORD:-agent-secret}@pocharlies-postgres:5432/langgraph
      - REDIS_URL=redis://pocharlies-redis:6379/1
      - RAG_SERVICE_URL=http://pocharlies-rag:5000
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - LLM_API_KEY=${LLM_API_KEY:-none}
      - LLM_MODEL=${LLM_MODEL:-qwen3next-80b}
    networks:
      - skirmshop-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-server:
        condition: service_started
      picqer-mcp:
        condition: service_started

volumes:
  qdrant_data:
    external: true
    name: skirmshopshopifyapp_qdrant_data
  redis_data:
  postgres_data:

networks:
  skirmshop-network:
    external: true
    name: skirmshop-network
