<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocharlies Agent</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">Pocharlies Agent</h1>
            <button id="new-thread-btn" class="btn-new-thread">+ New Thread</button>
        </div>
        <nav id="thread-list" class="thread-list"></nav>
        <div class="mcp-section">
            <h2 class="mcp-title">MCP Servers</h2>
            <div id="mcp-status" class="mcp-status">
                <span class="mcp-placeholder">No servers connected</span>
            </div>
        </div>
    </aside>

    <main class="chat-area">
        <button id="help-btn" class="help-btn" title="Quick actions">?</button>
        <div id="help-overlay" class="help-overlay hidden"></div>
        <div id="help-popup" class="help-popup hidden">
            <div class="help-popup-header">
                <span class="help-popup-title">Quick Actions</span>
                <button id="help-close-btn" class="help-close-btn">&times;</button>
            </div>
            <div class="help-popup-body">
                <div class="help-group">
                    <div class="help-group-label">Products</div>
                    <button class="help-action" data-prompt="Search for AEG rifles under 200 euros">AEG rifles &lt; 200&euro;</button>
                    <button class="help-action" data-prompt="Show product catalog statistics and top brands">Catalog stats</button>
                    <button class="help-action" data-prompt="What Tokyo Marui products do we have in stock?">Tokyo Marui stock</button>
                </div>
                <div class="help-group">
                    <div class="help-group-label">Competitors</div>
                    <button class="help-action" data-prompt="List all indexed competitor sources and their product counts">Competitor sources</button>
                    <button class="help-action" data-prompt="Compare our prices with airsoftzone.de">Compare prices</button>
                    <button class="help-action" data-prompt="Crawl https://www.airsoftzone.de and index their products">Crawl competitor</button>
                </div>
                <div class="help-group">
                    <div class="help-group-label">Web &amp; Knowledge</div>
                    <button class="help-action" data-prompt="List all indexed web sources with page counts">Indexed sources</button>
                    <button class="help-action" data-prompt="Search the knowledge base for airsoft battery types and compatibility">Battery guide</button>
                    <button class="help-action" data-prompt="What collections exist in Qdrant and how many vectors does each have?">Collection stats</button>
                </div>
                <div class="help-group">
                    <div class="help-group-label">Translation &amp; Tools</div>
                    <button class="help-action" data-prompt="Translate 'pistola de airsoft de gas blowback con retroceso realista' to English, French, and German">Translate text</button>
                    <button class="help-action" data-prompt="Check the health of all connected services and dependencies">System health</button>
                    <button class="help-action" data-prompt="Sync products from Shopify and report what changed">Sync products</button>
                </div>
            </div>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <textarea
                id="message-input"
                class="message-input"
                placeholder="Type a message..."
                rows="1"
            ></textarea>
            <button id="send-btn" class="btn-send" title="Send message">
                <span class="send-icon">&#9654;</span>
            </button>
        </div>
        <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
        <footer class="status-bar">
            <span id="status-indicator" class="status-indicator disconnected"></span>
            <span id="status-text" class="status-text">Disconnected</span>
        </footer>
    </main>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
